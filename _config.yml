title: "halqery"
description: "Pokemon Legends: Arceus Speedrunner"
author: "halqery"

permalink: /:slug

twitter:
  username: halqery
  card: summary_large_image

theme_config:
  appearance: "dark"
  appearance_toggle: true
  date_format: "%Y-%m-%d"
  show_description: true
  show_navbar: true
  show_footer: true
  show_copyright: true
  show_projects: true
  show_blog: true
  show_reading_time: true
  show_tags: true
  show_code_copy: true
  show_progress_bar: true
  show_back_to_top: true

highlighter: rouge

# Plugins for a stable, local build
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-markdown-output
  - jekyll-llms-output

# Emit a clean .md sibling for each post (e.g. /foo -> /foo.md) so AI agents
# can fetch source Markdown instead of parsing HTML. Set enabled: false to disable.
markdown_output:
  collections: [posts]

# Emit /llms.txt (curated index) and /llms-full.txt (full content) so agents
# can discover and ingest the site. See https://llmstxt.org for the spec.
llms_output:
  index:
    collections: [posts]
  full:
    collections: [posts]
    respect_markdown_output: true
